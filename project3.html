<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Loops</title>
</head>
<body>

    <h2>JavaScript String Methods and Loops</h2>

    <p>Numbers from 1 to 10</p>

    <p id="result"></p>

    <script>
        // Store numbers in a string
        var number = "";

        // Loop from 1 to 10
        for (var i = 1; i <= 10; i++) {
            number += i + "<br>";
        }

        // Display the numbers
        document.getElementById("result").innerHTML = number;

        // Display a random number
        document.write("<br><strong>The random value is:</strong> " + Math.floor(Math.random() * 100));

        // Create a Date object
        var date = new Date();

        // Display today's date
        document.write("<br><strong>Today's Date is:</strong> " + date.toDateString());
    </script>

</body>
</html>
